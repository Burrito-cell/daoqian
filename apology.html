<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给瑶瑶姐 ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fff5f7 0%, #ffe4ec 40%, #ffd6e0 100%);
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* === Floating hearts background === */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .heart {
    position: absolute;
    bottom: -40px;
    font-size: 18px;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; }
    10%  { opacity: 0.5; }
    85%  { opacity: 0.35; }
    100% { transform: translateY(-110vh) rotate(720deg) scale(1.2); opacity: 0; }
  }

  /* === Card === */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 48px 40px 56px;
    box-shadow:
      0 2px 40px rgba(220, 20, 60, 0.08),
      0 8px 32px rgba(220, 20, 60, 0.06),
      0 0 0 1px rgba(255,255,255,0.6);
    animation: cardIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    text-align: center;
  }
  @keyframes cardIn {
    0%   { opacity:0; transform: translateY(30px) scale(0.97); }
    100% { opacity:1; transform: translateY(0) scale(1); }
  }

  /* === Bow SVG area === */
  .bow-wrap {
    margin-bottom: 4px;
    display: flex;
    justify-content: center;
    animation: bowSway 3s ease-in-out infinite;
  }
  @keyframes bowSway {
    0%, 100% { transform: rotate(-1deg); }
    50%      { transform: rotate(1deg); }
  }
  .bow-wrap svg {
    width: 140px;
    height: auto;
    filter: drop-shadow(0 4px 12px rgba(200,0,40,0.2));
  }

  /* === To line === */
  .to-line {
    font-size: 18px;
    color: #d42d5a;
    letter-spacing: 3px;
    margin-bottom: 24px;
    position: relative;
    display: inline-block;
  }
  .to-line::before,
  .to-line::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 24px;
    height: 1.5px;
    background: #f0b0c0;
    border-radius: 2px;
  }
  .to-line::before { right: calc(100% + 14px); }
  .to-line::after  { left: calc(100% + 14px); }

  /* === Divider === */
  .divider {
    width: 60px;
    height: 2.5px;
    background: linear-gradient(90deg, transparent, #f0a0b8, transparent);
    border-radius: 3px;
    margin: 0 auto 28px;
  }

  /* === Message body === */
  .message {
    text-align: left;
    color: #3a2a30;
    line-height: 2;
    font-size: 17px;
    letter-spacing: 0.5px;
  }
  .message p {
    margin-bottom: 18px;
  }
  .message .highlight {
    color: #cc2244;
    font-weight: 400;
  }
  .message .quote {
    padding: 12px 20px;
    margin: 10px 0 18px;
    background: linear-gradient(135deg, #fff0f4, #fff5f8);
    border-left: 3px solid #e8739a;
    border-radius: 0 12px 12px 0;
    color: #6a3a48;
    font-size: 16px;
    line-height: 1.9;
  }

  /* === Closing === */
  .closing {
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 18px;
    color: #d42d5a;
  }
  .closing .mini-heart {
    display: inline-block;
    animation: miniPulse 1.6s ease-in-out infinite;
  }
  @keyframes miniPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.25); }
  }
  /* === Signature === */
  .signature {
    margin-top: 10px;
    font-size: 16px;
    color: #d42d5a;
    letter-spacing: 1px;
    opacity: 0.75;
  }
  .signature::before {
    content: '—— ';
  }

  /* === Small deco bows === */
  .deco-bows {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    opacity: 0.5;
  }
  .deco-bows svg {
    width: 24px;
    height: auto;
  }

  /* === Responsive === */
  @media (max-width: 480px) {
    .card { padding: 32px 22px 40px; border-radius: 24px; }
    .bow-wrap svg { width: 100px; }
    .message { font-size: 15px; }
    .to-line { font-size: 15px; }
    .to-line::before,
    .to-line::after { width: 14px; }
    .to-line::before { right: calc(100% + 10px); }
    .to-line::after  { left: calc(100% + 10px); }
  }
</style>
</head>
<body>

<!-- Floating hearts -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Card -->
<div class="card">

  <!-- Red bow -->
  <div class="bow-wrap">
    <svg viewBox="0 0 240 170" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bowL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff5577"/>
          <stop offset="100%" stop-color="#cc1133"/>
        </linearGradient>
        <linearGradient id="bowR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ff5577"/>
          <stop offset="100%" stop-color="#cc1133"/>
        </linearGradient>
        <linearGradient id="bowTail" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#cc1133"/>
          <stop offset="100%" stop-color="#990025"/>
        </linearGradient>
      </defs>
      <!-- Left loop -->
      <path d="M120,52 C80,8 12,18 12,62 C12,96 72,88 120,62Z" fill="url(#bowL)"/>
      <!-- Right loop -->
      <path d="M120,52 C160,8 228,18 228,62 C228,96 168,88 120,62Z" fill="url(#bowR)"/>
      <!-- Left tail -->
      <path d="M110,66 C94,100 62,138 48,158 L62,166 C78,146 106,108 118,72Z" fill="url(#bowTail)"/>
      <!-- Right tail -->
      <path d="M130,66 C146,100 178,138 192,158 L178,166 C162,146 134,108 122,72Z" fill="url(#bowTail)"/>
      <!-- Center knot -->
      <ellipse cx="120" cy="58" rx="17" ry="15" fill="#cc1133"/>
      <ellipse cx="115" cy="52" rx="8" ry="5" fill="#ff7799" opacity="0.5"/>
    </svg>
  </div>

  <!-- To -->
  <div class="to-line">给 瑶瑶姐</div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Message -->
  <div class="message">
    <p>姐姐对不起，<span class="highlight">我有好好反思</span>。</p>

    <div class="quote">
      还记得在镇江时你和我说过的话吗——<br>
      「如果我们说话的风格是对着干会怎么样。」
    </div>

    <p>
      没想到，竟是因为我的不冷静，<br>
      真的有了这次口角。
    </p>

    <p>
      和姐姐闹别扭真的很难受。<br>
      <span class="highlight">我不想再体会第二次了。</span>
    </p>
  </div>

  <!-- Closing -->
  <div class="closing">
    <span class="mini-heart">♥</span>
    <span>对不起</span>
    <span class="mini-heart">♥</span>
  </div>
  <div class="signature">爱你的皓文</div>

  <!-- Small decorative bows -->
  <div class="deco-bows">
    <svg viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M20,8 C14,2 2,4 2,12 C2,20 14,16 20,12Z" fill="#e8739a"/>
      <path d="M20,8 C26,2 38,4 38,12 C38,20 26,16 20,12Z" fill="#e8739a"/>
      <ellipse cx="20" cy="10" rx="4" ry="3.5" fill="#d42d5a"/>
    </svg>
    <svg viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M20,8 C14,2 2,4 2,12 C2,20 14,16 20,12Z" fill="#e8739a"/>
      <path d="M20,8 C26,2 38,4 38,12 C38,20 26,16 20,12Z" fill="#e8739a"/>
      <ellipse cx="20" cy="10" rx="4" ry="3.5" fill="#d42d5a"/>
    </svg>
    <svg viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M20,8 C14,2 2,4 2,12 C2,20 14,16 20,12Z" fill="#e8739a"/>
      <path d="M20,8 C26,2 38,4 38,12 C38,20 26,16 20,12Z" fill="#e8739a"/>
      <ellipse cx="20" cy="10" rx="4" ry="3.5" fill="#d42d5a"/>
    </svg>
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('heartsBg');
  const symbols = ['♥', '♡', '♥', '♡'];
  const count = 18;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'heart';
    el.textContent = symbols[i % symbols.length];
    el.style.left = (6 + Math.random() * 88) + '%';
    el.style.fontSize = (12 + Math.random() * 18) + 'px';
    el.style.animationDuration = (12 + Math.random() * 14) + 's';
    el.style.animationDelay = (Math.random() * 14) + 's';
    el.style.color = ['#e8739a','#f09ab0','#d42d5a','#f5b8c8'][i % 4];
    container.appendChild(el);
  }
})();
</script>
</body>
</html>
